<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BTS Dependency Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Calibri,Arial,sans-serif;font-size:13px;background:#f4f5f8;color:#333}

/* Header */
.hdr{background:#2e3250;color:#fff;padding:9px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.hdr h1{font-size:14px;font-weight:500}
.hdr-r{display:flex;gap:8px;align-items:center}
#sync-status{font-size:11px;font-weight:600;margin-right:4px}

/* Toolbar */
.toolbar{background:#fff;padding:7px 20px;border-bottom:1px solid #e0e3eb;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:41px;z-index:99}
.toolbar label{font-size:11px;color:#888;font-weight:500}
.fsel{padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:11px;background:#fff;cursor:pointer}

/* Buttons */
.btn{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid;transition:.15s}
.btn-dark{background:#3a3f5c;color:#fff;border-color:#3a3f5c} .btn-dark:hover{background:#2e3249}
.btn-blue{background:#4a6fa5;color:#fff;border-color:#4a6fa5} .btn-blue:hover{background:#3a5a8a}
.btn-out{background:#fff;color:#4a6fa5;border-color:#c5d0e8} .btn-out:hover{background:#f0f4fb}
.btn-sm-g{background:#fff;color:#4a7c40;border-color:#b8d4b0;padding:2px 8px;font-size:11px} .btn-sm-g:hover{background:#f4fbf2}
.btn-sm-r{background:#fff;color:#a33;border-color:#e0b0b0;padding:2px 8px;font-size:11px} .btn-sm-r:hover{background:#fff5f5}
.btn-ghost{background:none;border:none;cursor:pointer;padding:2px 4px;font-size:12px;color:#aaa;border-radius:3px} .btn-ghost:hover{background:#f0f0f0;color:#555}

/* Summary bar */
.sbar{background:#f8f9fb;border-bottom:1px solid #e8eaef;padding:6px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.spill{font-size:11px;font-weight:600;padding:2px 10px;border-radius:10px;white-space:nowrap}
.sbar-toggle{background:none;border:none;cursor:pointer;font-size:11px;color:#888;font-family:inherit;padding:0;margin-right:4px}
.sbar-toggle:hover{color:#444}

/* Legend */
.legend{display:flex;gap:8px;flex-wrap:wrap;padding:6px 20px;align-items:center;border-bottom:1px solid #e8eaef;background:#fafbfc}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* Epic cards panel */
.epic-panel{display:none;padding:10px 20px;background:#f8f9fb;border-bottom:1px solid #e8eaef;flex-wrap:wrap;gap:8px}
.epic-panel.open{display:flex}
.ecard{background:#fff;border-left:3px solid #4a6fa5;border-radius:4px;padding:8px 12px;flex:1;min-width:180px;border:1px solid #eaecf2;border-left:3px solid #4a6fa5}
.ecard-jira{font-size:11px;margin-bottom:2px}
.ecard-title{font-size:11px;font-weight:600;color:#3a3f5c;margin-bottom:4px;line-height:1.3}
.ecard-prog{height:3px;background:#eee;border-radius:2px;margin-bottom:4px;overflow:hidden}
.ecard-pfill{height:100%;background:linear-gradient(90deg,#4a6fa5,#4CAF50);border-radius:2px;transition:width .4s}
.ecard-stats{display:flex;gap:4px;flex-wrap:wrap}
.spill2{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}

/* Tracker */
.tracker{padding:16px 20px 40px}

/* Each epic block */
.epic-block{margin-bottom:16px;border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #dde3f0;display:flex}

/* Epic rail (left column) */
.epic-rail{width:140px;min-width:140px;background:#c8d0e8;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:12px 8px;text-align:center;border-right:2px solid #a0aac8}
.epic-badge{display:inline-block;background:#4a6fa5;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;text-decoration:none;margin-bottom:6px} .epic-badge:hover{background:#3a5a8a}
.epic-name{font-size:11px;font-weight:600;color:#1a2540;line-height:1.4;margin-bottom:8px;word-break:break-word}
.epic-link{color:#4a6fa5;font-size:10px;text-decoration:none;margin-bottom:10px;display:block;font-weight:500} .epic-link:hover{color:#2e4a7a}
.epic-assignee{font-size:10px;color:#4a5a7a;background:#d8dff0;border-radius:8px;padding:2px 7px;margin-bottom:6px;display:inline-block;font-weight:500}
.epic-rail-btns{display:flex;flex-direction:column;gap:4px;width:100%}
.btn-icon-g{background:#fff;border:1px solid #b8d4b0;color:#4a7c40;padding:3px 0;border-radius:3px;font-size:11px;cursor:pointer;width:100%} .btn-icon-g:hover{background:#f0faf0}
.btn-icon-r{background:#fff;border:1px solid #e0b0b0;color:#a33;padding:3px 0;border-radius:3px;font-size:11px;cursor:pointer;width:100%} .btn-icon-r:hover{background:#fff5f5}

/* Epic content (right side) */
.epic-content{flex:1;min-width:0}

/* Section header */
.sec-hdr{background:#6878a8;color:#fff;font-size:12px;font-weight:600;padding:5px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #506090}
.sec-hdr-btns{display:flex;gap:4px}
.btn-sec-g{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#d0f0d0;padding:1px 7px;border-radius:3px;font-size:11px;cursor:pointer} .btn-sec-g:hover{background:rgba(255,255,255,.25)}
.btn-sec-r{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#ffc0c0;padding:1px 7px;border-radius:3px;font-size:11px;cursor:pointer} .btn-sec-r:hover{background:rgba(255,255,255,.25)}

/* Table */
table{width:100%;border-collapse:collapse;background:#fff;table-layout:fixed}
thead th{background:#3a4f7a;color:#fff;font-size:13px;font-weight:700;padding:8px 8px;text-align:left;white-space:nowrap}
thead th:first-child{width:36px;text-align:center}
thead th:nth-child(3){width:110px}
thead th:nth-child(4){width:130px}
thead th:nth-child(5){width:110px}
thead th:nth-child(6){width:200px}
thead th:nth-child(7){width:66px;text-align:center}
.drow td{padding:5px 7px;border-bottom:1px solid #eef0f5;vertical-align:top;overflow:hidden;word-break:break-word}
.drow.alt td{background:#F5F8FF}
.drow:hover td{background:#EBF2FF!important}
.drow:hover .row-act{opacity:1!important}
.num-c{text-align:center;font-weight:700;color:#aaa;font-size:11px;vertical-align:middle!important;width:36px}
.act-c{text-align:center;vertical-align:middle!important;width:66px}
.row-act{opacity:0;transition:.15s;display:flex;gap:2px;justify-content:center}

/* Inputs */
.ci{width:100%;border:none;background:transparent;font-size:13px;font-family:inherit;padding:2px;outline:none;color:#333;resize:none;overflow:hidden;min-height:24px;line-height:1.5}
.ci:focus{background:#fffde7;border-radius:3px}
.di{border:none;background:transparent;font-size:12px;font-family:inherit;padding:2px 0;outline:none;width:100%;cursor:pointer;color:#333}
.di:focus{background:#fffde7;border-radius:3px}
.di.ov{background:#FFD7D7!important;color:#C00000!important;font-weight:700;border-radius:3px;padding:2px 4px}
.ss{width:100%;border:1px solid #e4e7f0;background:#f9f9fb;font-size:12px;font-family:inherit;font-weight:500;padding:4px 5px;outline:none;cursor:pointer;border-radius:4px}

.hidden{display:none!important}

/* Modals */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:8px;padding:22px;min-width:300px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-size:14px;font-weight:600;color:#1F3864;margin-bottom:14px}
.modal label{font-size:11px;font-weight:600;color:#555;display:block;margin-bottom:3px;margin-top:8px}
.modal input,.modal select{width:100%;padding:6px 9px;border:1px solid #ccc;border-radius:4px;font-size:12px;font-family:inherit}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* Overdue toast */
.toast-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;align-items:flex-start;justify-content:center;padding-top:60px}
.toast-bg.open{display:flex}
.toast{background:#fff;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.18);width:540px;max-width:92vw;max-height:70vh;display:flex;flex-direction:column;overflow:hidden;border-top:4px solid #d9534f}
.toast-hdr{padding:12px 16px 8px;border-bottom:1px solid #f0e0e0;display:flex;align-items:center;justify-content:space-between}
.toast-hdr h3{font-size:13px;font-weight:700;color:#a33;margin:0}
.toast-body{overflow-y:auto;padding:8px 16px 12px;flex:1}
.toast-item{padding:7px 0;border-bottom:1px solid #f5f0f0;display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:start}
.toast-item:last-child{border-bottom:none}
.toast-item .ti-area{font-size:12px;color:#333;line-height:1.4}
.toast-item .ti-meta{font-size:11px;color:#888;margin-top:2px}
.toast-item .ti-days{font-size:11px;font-weight:700;color:#C00000;white-space:nowrap}
.toast-footer{padding:8px 16px;border-top:1px solid #f0e0e0;display:flex;gap:8px;justify-content:flex-end;background:#fafafa}

@media print{.hdr .hdr-r,.toolbar,.sbar,.legend,.epic-hdr-btns,.sec-hdr-btns,.act-c,.row-act{display:none!important} body{background:#fff} .tracker{padding:0}}
</style>
</head>
<body>

<div class="hdr">
  <h1>📊 Open Dependencies Tracker – BTS (Bloom: Comic Creator + Video) <span style="background:#FFD700;color:#1F3864;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle">v3.0</span></h1>
  <div class="hdr-r">
    <span id="sync-status"></span>
    <button class="btn btn-out" onclick="manualRefresh()" style="background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,.5)">🔄 Refresh</button>
    <button class="btn btn-out" onclick="window.print()" style="background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,.5)">🖨️ Print</button>
    <button class="btn btn-blue" onclick="exportCSV()">⬇️ CSV</button>
  </div>
</div>

<div class="toolbar">
  <label>Epic:</label>
  <select class="fsel" id="flt-epic" onchange="filterByEpic(this.value)">
    <option value="all">All Epics</option>
  </select>
  <label>Status:</label>
  <select class="fsel" id="flt-status" onchange="filterByStatus(this.value)">
    <option value="all">All</option>
    <option value="In Progress">In Progress</option>
<option value="Pending">Pending</option>
<option value="Blocked">Blocked</option>
<option value="Done">Done</option>
<option value="Delayed">Delayed</option>
<option value="At Risk">At Risk</option>
  </select>
  <button class="btn btn-out" onclick="clearFilters()">✕ Clear</button>
  <button class="btn btn-dark" onclick="openModal('add-epic-modal')" style="margin-left:6px">＋ Add Epic</button>
  <span style="margin-left:auto;font-size:11px;color:#888" id="row-count"></span>
</div>

<div class="sbar">
  <span class="spill" style="background:#f0f0f0;color:#555">Total: <strong id="s-total">0</strong></span>
  <span class="spill" style="background:#E2EFDA;color:#375623">Done: <strong id="s-done">0</strong></span>
  <span class="spill" style="background:#DDEEFF;color:#1F497D">In Prog: <strong id="s-inprog">0</strong></span>
  <span class="spill" style="background:#FFE0E0;color:#C00000">Blocked: <strong id="s-blk">0</strong></span>
  <span class="spill" style="background:#FFD7D7;color:#C00000">Overdue: <strong id="s-ov">0</strong></span>
  <button class="sbar-toggle" onclick="toggleEpicPanel(this)" style="margin-left:8px">▶ Epic Cards</button>
</div>
<div class="epic-panel" id="epic-panel"></div>

<div class="legend">
  <strong style="font-size:11px;margin-right:2px;color:#666">Status:</strong>
  <div class="leg"><div class="ldot" style="background:#E2EFDA;border:1px solid #b0cba8"></div>Done</div>
  <div class="leg"><div class="ldot" style="background:#DDEEFF;border:1px solid #a0bcd8"></div>In Progress</div>
  <div class="leg"><div class="ldot" style="background:#FFF2CC;border:1px solid #d4c080"></div>Pending</div>
  <div class="leg"><div class="ldot" style="background:#FFE0E0;border:1px solid #d8a0a0"></div>Blocked</div>
  <div class="leg"><div class="ldot" style="background:#C0392B;border:1px solid #922b21"></div>Delayed</div>
  <div class="leg"><div class="ldot" style="background:#E67E22;border:1px solid #ca6f1e"></div>At Risk</div>
  <div class="leg" style="margin-left:8px"><div class="ldot" style="background:#FFD7D7;border:1px solid #d8a0a0"></div>Overdue ETA</div>
</div>

<div class="tracker" id="tracker"></div>

<!-- ADD SECTION MODAL -->
<div class="modal-bg" id="add-sec-modal">
  <div class="modal">
    <h3>➕ Add Section</h3>
    <label>Emoji</label><input id="ns-emoji" value="📌" style="width:60px">
    <label>Section Name</label><input id="ns-name" placeholder="e.g. Engineering">
    <label>Number of Rows</label><input id="ns-rows" type="number" value="2" min="1" max="20">
    <div class="modal-actions">
      <button class="btn btn-out" onclick="closeModal('add-sec-modal')">Cancel</button>
      <button class="btn btn-blue" onclick="confirmAddSec()">Add</button>
    </div>
  </div>
</div>

<!-- ADD EPIC MODAL -->
<div class="modal-bg" id="add-epic-modal">
  <div class="modal">
    <h3>➕ Add Epic</h3>
    <label>Jira ID</label><input id="ne-jira" placeholder="SPG-12345">
    <label>Epic Name</label><input id="ne-name" placeholder="Feature name...">
    <div class="modal-actions">
      <button class="btn btn-out" onclick="closeModal('add-epic-modal')">Cancel</button>
      <button class="btn btn-blue" onclick="confirmAddEpic()">Add</button>
    </div>
  </div>
</div>

<!-- OVERDUE TOAST -->
<div class="toast-bg" id="overdue-toast">
  <div class="toast">
    <div class="toast-hdr"><h3>⚠️ Overdue Dependencies</h3><span id="toast-count" style="font-size:11px;color:#aaa"></span></div>
    <div class="toast-body" id="toast-body"></div>
    <div class="toast-footer">
      <button class="btn btn-out" onclick="closeToast(false)">Dismiss</button>
      <button class="btn btn-blue" onclick="closeToast(true)">Auto-set Delayed & Dismiss</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const JIRA_BASE = 'https://jira.corp.adobe.com/browse/';
const FB_URL = 'https://bts-tracker-50aa1-default-rtdb.firebaseio.com/bts-tracker/v2.json?auth=AIzaSyAkbUcaBkZzdES9CwcL4Us4YpFxmkD18D0';
const SC = {

  "At Risk":     ["#E67E22", "#ffffff"]
};
const STATUSES = ["", "In Progress", "Pending", "Blocked", "Done", "Delayed", "At Risk"];
const DEF_SECS = [{"emoji": "\ud83c\udfa8", "name": "Design \u2013 Video BTS", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83d\udcf1", "name": "Design \u2013 Mobile / Tablet", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83d\udccb", "name": "Product", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83c\udfa4", "name": "Legal / Ethics", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83d\udce3", "name": "Marketing", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\u270f\ufe0f", "name": "Content", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83d\udcb0", "name": "COGs", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83d\udd25", "name": "Firefly Team", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}];
const EPIC0 = [{"emoji": "\ud83c\udfa8", "name": "Design \u2013 Video BTS", "rows": [{"area": "Theme icons for animated video maker that are not present in comic creator", "owner": "Uriel", "status": "", "eta": "", "blockers": ""}, {"area": "UI experience when photorealistic or classroom themes is selected because surprise me workflow will only work for these themes", "owner": "Uriel", "status": "", "eta": "", "blockers": ""}, {"area": "Home screen tile for animated video maker", "owner": "Uriel", "status": "", "eta": "", "blockers": ""}, {"area": "Logged out - copy doc for one free comic messaging", "owner": "Uriel", "status": "", "eta": "", "blockers": ""}, {"area": "Logged out - what will be the experience when user has already generated one comic, and they enter comic strip again", "owner": "Uriel", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83d\udcf1", "name": "Design \u2013 Mobile / Tablet", "rows": [{"area": "Ipad and mobile designs for video. Ipad is p0 and mobile is p1 for BTS as confirmed by Ali", "owner": "Uriel", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83d\udccb", "name": "Product", "rows": [{"area": "When a video is opened from your stuff, it will open as a complete one video of 32 or 40 seconds", "owner": "Ali", "status": "", "eta": "", "blockers": ""}, {"area": "When a video is opened from your stuff, it will open as a complete one video of 32 or 40 seconds", "owner": "Ali", "status": "", "eta": "", "blockers": ""}, {"area": "Audience and geos expected for animated video maker", "owner": "Ali", "status": "", "eta": "", "blockers": ""}, {"area": "Throttling limits for videos", "owner": "Ali", "status": "", "eta": "", "blockers": ""}, {"area": "List of supported platforms for videos", "owner": "Ali", "status": "", "eta": "", "blockers": ""}, {"area": "Supported audio languages for videos. Currently, French, German, Spanish, Hindi, English are available.", "owner": "Ali", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83c\udfa4", "name": "Legal / Ethics", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "Ethics Evaluation", "owner": "Siddhant", "status": "Pending", "eta": "2025-07-10", "blockers": ""}]}, {"emoji": "\ud83d\udce3", "name": "Marketing", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\u270f\ufe0f", "name": "Content", "rows": [{"area": "Prompt Dropdown text | Names for themes | Update thumbnails | Update character previews | Approve 10 Exemplar Videos | Loading text for Videos", "owner": "Rebecca, Tanya", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83d\udcb0", "name": "COGs", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}, {"emoji": "\ud83d\udd25", "name": "Firefly Team", "rows": [{"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}, {"area": "", "owner": "", "status": "", "eta": "", "blockers": ""}]}];

// ── STATE ────────────────────────────────────────────────────────────────────
let epics = [

  ["SPG-17249", "[Acq] Bloom Comic Creator - Creator Mode BTS", "Aastha"],

// ── INIT DATA ─────────────────────────────────────────────────────────────────
function initSections() {

    if (ei === 0) return JSON.parse(JSON.stringify(EPIC0));
    return DEF_SECS.map(s => ({ emoji: s.emoji, name: s.name, rows: s.rows.map(r => ({...r})) }));
  });
}

// ── FIREBASE ─────────────────────────────────────────────────────────────────
function setStatus(msg, color) {
  const el = document.getElementById('sync-status');
  el.textContent = msg; el.style.color = color || '#aaa';
}

async function loadFromFirebase() {
  try {
    const res = await fetch(FB_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.sections && Array.isArray(data.sections)) {
      // Merge: keep our epics array, only update sections data
      data.sections.forEach((savedEpicSecs, savedEi) => {
        const savedJira = (data.epics || [])[savedEi]?.[0];
        if (!savedJira) return;
        const localEi = epics.findIndex(([j]) => j === savedJira);
        if (localEi < 0) return;
        if (!Array.isArray(savedEpicSecs)) return;
        savedEpicSecs.forEach(savedSec => {
          if (!savedSec || !savedSec.name) return;
          const localSi = sections[localEi].findIndex(s => s.name === savedSec.name);
          if (localSi >= 0 && Array.isArray(savedSec.rows)) {
            sections[localEi][localSi].rows = savedSec.rows;
          } else if (localSi < 0 && savedSec.rows) {
            sections[localEi].push(savedSec);
          }
        });
      });
      setStatus('✅ ' + new Date().toLocaleTimeString(), '#4a7c40');
      return true;
    }
  } catch(e) {
    setStatus('⚠️ Offline mode', '#e6a817');
  }
  return false;
}

async function saveToFirebase() {
  _lastSave = Date.now();
  // Save to localStorage backup
  try { localStorage.setItem('bts_v3', JSON.stringify({epics, sections})); } catch(e) {}
  // Save to Firebase
  try {
    const body = JSON.stringify({
      epics: epics,
      sections: sections,
      lastUpdated: new Date().toISOString()
    });
    await fetch(FB_URL, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body
    });
    setStatus('💾 ' + new Date().toLocaleTimeString(), '#4a7c40');
  } catch(e) {
    setStatus('⚠️ Save failed', '#C00000');
  }
}

async function manualRefresh() {
  setStatus('⏳ Refreshing...', '#888');
  await loadFromFirebase();
  render();
  updateEpicDropdown();
  updateDashboard();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const wrap = document.getElementById('tracker');
  wrap.innerHTML = '';
  epics.forEach(([jira, name], ei) => {
    const block = document.createElement('div');
    block.className = 'epic-block';
    block.dataset.ei = ei;

    // Left rail
    const rail = document.createElement('div');
    rail.className = 'epic-rail';
    const assignee = epics[ei][2] || '';
    rail.innerHTML = `
      <a href="${JIRA_BASE}${jira}" target="_blank" class="epic-badge">${jira}</a>
      <span class="epic-name">${name}</span>
      ${assignee ? `<span class="epic-assignee">👤 ${assignee}</span>` : ''}
      <a href="${JIRA_BASE}${jira}" target="_blank" class="epic-link">↗ Jira</a>
      <div class="epic-rail-btns">
        <button class="btn-icon-g" onclick="openAddSecModal(${ei})">＋ Section</button>
        <button class="btn-icon-r" onclick="delEpic(${ei})">✕ Delete</button>
      </div>`;
    block.appendChild(rail);

    // Right content
    const content = document.createElement('div');
    content.className = 'epic-content';

    // Sections
    (sections[ei] || []).forEach((sec, si) => {
      const secHdr = document.createElement('div');
      secHdr.className = 'sec-hdr';
      secHdr.dataset.ei = ei;
      secHdr.dataset.si = si;
      secHdr.innerHTML = `
        <span>${sec.emoji} ${sec.name}</span>
        <div class="sec-hdr-btns">
          <button class="btn-sec-g" onclick="addRow(${ei},${si})">＋ Row</button>
          <button class="btn-sec-r" onclick="delSec(${ei},${si})">✕ Section</button>
        </div>`;
      content.appendChild(secHdr);

      const tbl = document.createElement('table');
      tbl.innerHTML = `<colgroup>
        <col style="width:36px"><col><col style="width:110px">
        <col style="width:130px"><col style="width:110px">
        <col style="width:200px"><col style="width:66px">
      </colgroup>
      <thead><tr>
        <th style="text-align:center">#</th><th>Area / Item</th>
        <th>Owner</th><th>Status</th><th>ETA</th>
        <th>Blockers / Comments</th><th style="text-align:center">Act</th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');
      (sec.rows || []).forEach((row, ri) => {
        tbody.appendChild(makeRow(ei, si, ri, row));
      });
      tbl.appendChild(tbody);
      content.appendChild(tbl);
    });

    block.appendChild(content);
    wrap.appendChild(block);
  });
}

function makeRow(ei, si, ri, row) {
  const tr = document.createElement('tr');
  tr.className = 'drow' + (ri % 2 === 1 ? ' alt' : '');
  tr.dataset.ei = ei; tr.dataset.si = si; tr.dataset.ri = ri;

  const so = STATUSES.map(s =>
    `<option value="${s}" ${row.status===s?'selected':''}>${s||'Select...'}</option>`
  ).join('');
  const ss = SC[row.status] ? `background:${SC[row.status][0]};color:${SC[row.status][1]};border-color:${SC[row.status][1]}44` : '';
  const ov = isPastDue(row.eta) && row.status !== 'Done' ? ' ov' : '';

  tr.innerHTML = `
    <td class="num-c">${ri+1}</td>
    <td><textarea class="ci" rows="1" placeholder="Describe dependency..." oninput="autoGrow(this);save_cell(${ei},${si},${ri},'area',this.value)">${xe(row.area)}</textarea></td>
    <td><input class="ci" type="text" placeholder="Owner" value="${xe(row.owner)}" oninput="save_cell(${ei},${si},${ri},'owner',this.value)"></td>
    <td><select class="ss" style="${ss}" onchange="save_status(${ei},${si},${ri},this)">${so}</select></td>
    <td><input class="di${ov}" type="date" value="${row.eta}" onchange="save_eta(${ei},${si},${ri},this)"></td>
    <td><textarea class="ci" rows="1" placeholder="Blockers / comments..." oninput="autoGrow(this);save_cell(${ei},${si},${ri},'blockers',this.value)">${xe(row.blockers)}</textarea></td>
    <td class="act-c"><div class="row-act">
      <button class="btn-ghost" onclick="mvRow(${ei},${si},${ri},-1)" title="Up">↑</button>
      <button class="btn-ghost" onclick="mvRow(${ei},${si},${ri},1)" title="Down">↓</button>
      <button class="btn-ghost" onclick="delRow(${ei},${si},${ri})" title="Delete" style="color:#C00000">🗑</button>
    </div></td>`;

  // Auto-grow textareas after insert
  setTimeout(() => tr.querySelectorAll('textarea').forEach(autoGrow), 0);
  return tr;
}

function xe(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isOverdue(eta, status) {
  if (!eta || status === 'Done') return false;
  const t = new Date(); t.setHours(0,0,0,0);
  return new Date(eta) < t;
}
function isPastDue(eta) {
  if (!eta) return false;
  const t = new Date(); t.setHours(0,0,0,0);
  return new Date(eta) < t;
}
function autoGrow(ta) { ta.style.height='auto'; ta.style.height=(ta.scrollHeight+2)+'px'; }

// ── CELL UPDATES (no re-render) ──────────────────────────────────────────────
function save_cell(ei, si, ri, field, val) {
  sections[ei][si].rows[ri][field] = val;
  saveToFirebase();
}

function save_status(ei, si, ri, sel) {
  const s = sel.value;
  sections[ei][si].rows[ri].status = s;
  if (SC[s]) { sel.style.background=SC[s][0]; sel.style.color=SC[s][1]; sel.style.borderColor=SC[s][1]+'44'; }
  else { sel.style.background='#f9f9fb'; sel.style.color='#333'; sel.style.borderColor='#e4e7f0'; }
  // Update ETA overdue
  const row = sel.closest('tr');
  if (row) {
    const dt = row.querySelector('.di');
    if (dt) dt.className = 'di' + (isOverdue(sections[ei][si].rows[ri].eta, s) ? ' ov' : '');
  }
  updateDashboard();
  saveToFirebase();
}

function save_eta(ei, si, ri, input) {
  sections[ei][si].rows[ri].eta = input.value;
  const s = sections[ei][si].rows[ri].status;
  // Auto-set Delayed if past due
  if (isOverdue(input.value, s) && s !== 'Delayed' && s !== 'Done') {
    sections[ei][si].rows[ri].status = 'Delayed';
    const sel = input.closest('tr')?.querySelector('.ss');
    if (sel) {
      sel.value = 'Delayed';
      sel.style.background = SC['Delayed'][0];
      sel.style.color = SC['Delayed'][1];
    }
  }
  input.className = 'di' + (isPastDue(input.value) && sections[ei][si].rows[ri].status !== 'Done' ? ' ov' : '');
  // Update ETA red highlight when status changes
  const row2 = sel.closest('tr');
  if (row2) {
    const dt = row2.querySelector('.di');
    if (dt) dt.className = 'di' + (isPastDue(sections[ei][si].rows[ri].eta) && sections[ei][si].rows[ri].status !== 'Done' ? ' ov' : '');
  }
  updateDashboard();
  saveToFirebase();
}

// ── STRUCTURAL CHANGES (with re-render, preserving position) ─────────────────
function structuralChange(fn) {
  const scrollY = window.scrollY;
  const epicVal = document.getElementById('flt-epic').value;
  const statusVal = document.getElementById('flt-status').value;
  fn();
  render();
  updateEpicDropdown();
  updateDashboard();
  updateRowCount();
  updateEpicCards();
  // Restore filter + scroll
  requestAnimationFrame(() => {
    document.getElementById('flt-epic').value = epicVal;
    document.getElementById('flt-status').value = statusVal;
    if (epicVal !== 'all') filterByEpic(epicVal);
    if (statusVal !== 'all') filterByStatus(statusVal);
    window.scrollTo(0, scrollY);
  });
  saveToFirebase();
}

function addRow(ei, si) {
  structuralChange(() => {
    sections[ei][si].rows.push({area:'',owner:'',status:'',eta:'',blockers:''});
  });
}

function delRow(ei, si, ri) {
  if (sections[ei][si].rows.length <= 1 && !confirm('Delete last row?')) return;
  structuralChange(() => sections[ei][si].rows.splice(ri, 1));
}

function mvRow(ei, si, ri, d) {
  const rows = sections[ei][si].rows;
  const ni = ri + d;
  if (ni < 0 || ni >= rows.length) return;
  structuralChange(() => { [rows[ri], rows[ni]] = [rows[ni], rows[ri]]; });
}

function delSec(ei, si) {
  if (!confirm(`Delete "${sections[ei][si].name}"?`)) return;
  structuralChange(() => sections[ei].splice(si, 1));
}

function delEpic(ei) {
  if (!confirm(`Delete "${epics[ei][1]}"?`)) return;
  structuralChange(() => { epics.splice(ei, 1); sections.splice(ei, 1); });
}

// ── ADD SECTION / EPIC ────────────────────────────────────────────────────────
function openAddSecModal(ei) {
  _addSecFor = ei;
  document.getElementById('ns-name').value = '';
  document.getElementById('ns-emoji').value = '📌';
  document.getElementById('ns-rows').value = '2';
  openModal('add-sec-modal');
}

function confirmAddSec() {
  const emoji = document.getElementById('ns-emoji').value.trim() || '📌';
  const name = document.getElementById('ns-name').value.trim();
  const n = parseInt(document.getElementById('ns-rows').value) || 2;
  if (!name) { alert('Enter a section name.'); return; }
  closeModal('add-sec-modal');
  structuralChange(() => {
    sections[_addSecFor].push({
      emoji, name,
      rows: Array.from({length:n}, ()=>({area:'',owner:'',status:'',eta:'',blockers:''}))
    });
  });
}

function confirmAddEpic() {
  const jira = document.getElementById('ne-jira').value.trim();
  const name = document.getElementById('ne-name').value.trim();
  if (!jira || !name) { alert('Fill in both fields.'); return; }
  closeModal('add-epic-modal');
  structuralChange(() => {
    epics.push([jira, name]);
    sections.push(DEF_SECS.map(s => ({ emoji:s.emoji, name:s.name, rows:s.rows.map(r=>({...r})) })));
  });
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function updateEpicDropdown() {
  const sel = document.getElementById('flt-epic');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">All Epics</option>' +
    epics.map(([j,n],i) => `<option value="${i}">${j} | ${n}</option>`).join('');
  // Restore selection if still valid
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
}

function filterByEpic(val) {
  document.querySelectorAll('.epic-block').forEach(b => {
    b.classList.toggle('hidden', val !== 'all' && b.dataset.ei !== val);
  });
  updateRowCount();
}

function filterByStatus(val) {
  document.querySelectorAll('.drow').forEach(r => {
    if (val === 'all') { r.classList.remove('hidden'); return; }
    const sel = r.querySelector('.ss');
    r.classList.toggle('hidden', !sel || sel.value !== val);
  });
  updateRowCount();
}

function clearFilters() {
  document.getElementById('flt-epic').value = 'all';
  document.getElementById('flt-status').value = 'all';
  document.querySelectorAll('.epic-block,.drow').forEach(r => r.classList.remove('hidden'));
  updateRowCount();
}

function updateRowCount() {
  const v = document.querySelectorAll('.drow:not(.hidden)').length;
  const t = document.querySelectorAll('.drow').length;
  document.getElementById('row-count').textContent = `${v} of ${t} items`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function updateDashboard() {
  let tot=0, done=0, ip=0, blk=0, ov=0;
  sections.forEach(secs => (secs||[]).forEach(sec => (sec.rows||[]).forEach(r => {
    tot++;
    if (r.status==='Done') done++;
    if (r.status==='In Progress') ip++;
    if (r.status==='Blocked') blk++;
    if (isOverdue(r.eta, r.status)) ov++;
  })));
  document.getElementById('s-total').textContent = tot;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-inprog').textContent = ip;
  document.getElementById('s-blk').textContent = blk;
  document.getElementById('s-ov').textContent = ov;
  updateEpicCards();
}

function updateEpicCards() {
  const panel = document.getElementById('epic-panel');
  if (!panel) return;
  panel.innerHTML = epics.map(([jira,name],ei) => {
    let d=0,ip=0,bl=0,ar=0,pd=0,dl=0,t=0;
    const secStats = [];
    (sections[ei]||[]).forEach(sec => {
      let sd=0,st=0;
      (sec.rows||[]).forEach(r => {
        t++; st++;
        if(r.status==='Done'){d++;sd++;}
        else if(r.status==='In Progress') ip++;
        else if(r.status==='Blocked') bl++;
        else if(r.status==='At Risk') ar++;
        else if(r.status==='Pending') pd++;
        else if(r.status==='Delayed') dl++;
      });
      secStats.push({name:sec.name, emoji:sec.emoji, done:sd, total:st});
    });
    const pct = t ? Math.round(d/t*100) : 0;
    const icon = bl>0?'🔴':ar>0?'🟠':dl>0?'🟠':pct===100?'✅':'🔵';
    const secRows = secStats.map(s => {
      const sp = s.total ? Math.round(s.done/s.total*100) : 0;
      return `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;border-bottom:1px solid #f0f0f5">
        <span style="font-size:11px;color:#666;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.emoji} ${s.name}</span>
        <div style="width:60px;height:4px;background:#eee;border-radius:2px;flex-shrink:0">
          <div style="width:${sp}%;height:100%;background:${sp===100?'#4CAF50':'#4a6fa5'};border-radius:2px"></div>
        </div>
        <span style="font-size:10px;color:#888;width:28px;text-align:right">${sp}%</span>
      </div>`;
    }).join('');
    return `<div class="ecard">
      <div class="ecard-jira"><a href="${JIRA_BASE}${jira}" target="_blank" style="color:#1F497D;font-weight:700;font-size:11px;text-decoration:none">${icon} ${jira}</a></div>
      <div class="ecard-title">${name}</div>
      ${epics[ei][2] ? `<div style="font-size:11px;color:#666;margin-bottom:4px">👤 ${epics[ei][2]}</div>` : ''}
      <div class="ecard-prog"><div class="ecard-pfill" style="width:${pct}%"></div></div>
      <div class="ecard-stats" style="margin-bottom:6px">
        <span class="spill2" style="background:#E2EFDA;color:#375623">${d} Done</span>
        ${ip?`<span class="spill2" style="background:#DDEEFF;color:#1F497D">${ip} In Prog</span>`:''}
        ${bl?`<span class="spill2" style="background:#FFE0E0;color:#C00000">${bl} Blocked</span>`:''}
        ${ar?`<span class="spill2" style="background:#E67E22;color:#fff">${ar} At Risk</span>`:''}
        ${dl?`<span class="spill2" style="background:#C0392B;color:#fff">${dl} Delayed</span>`:''}
        ${pd?`<span class="spill2" style="background:#FFF2CC;color:#7F6000">${pd} Pending</span>`:''}
        <span class="spill2" style="background:#f0f2f5;color:#555">${pct}%</span>
      </div>
      <div style="font-size:11px;font-weight:600;color:#888;margin-bottom:3px">SECTIONS</div>
      ${secRows}
    </div>`;
  }).join('');
}

function toggleEpicPanel(btn) {
  const panel = document.getElementById('epic-panel');
  const open = panel.classList.toggle('open');
  btn.textContent = (open ? '▼' : '▶') + ' Epic Cards';
}

// ── OVERDUE TOAST ─────────────────────────────────────────────────────────────
function showOverdueToast() {
  const items = [];
  sections.forEach((secs, ei) => (secs||[]).forEach((sec,si) => (sec.rows||[]).forEach((r,ri) => {
    if (r.eta && isOverdue(r.eta, r.status)) {
      const days = Math.round((new Date()-new Date(r.eta))/(86400000));
      items.push({ei,si,ri,jira:epics[ei][0],sec:sec.name,area:r.area||'(no description)',days});
    }
  })));
  if (!items.length) return;
  document.getElementById('toast-count').textContent = `${items.length} overdue`;
  document.getElementById('toast-body').innerHTML = items.map(it =>
    `<div class="toast-item">
      <div><div class="ti-area">${it.area.length>80?it.area.slice(0,80)+'…':it.area}</div>
      <div class="ti-meta">${it.jira} · ${it.sec}</div></div>
      <div class="ti-days">${it.days}d overdue</div>
    </div>`
  ).join('');
  document.getElementById('overdue-toast').classList.add('open');
}

function closeToast(autoDelay) {
  if (autoDelay) {
    sections.forEach((secs,ei) => (secs||[]).forEach((sec,si) => (sec.rows||[]).forEach((r,ri) => {
      if (r.eta && isOverdue(r.eta, r.status)) sections[ei][si].rows[ri].status = 'Delayed';
    })));
    render(); updateDashboard(); saveToFirebase();
  }
  document.getElementById('overdue-toast').classList.remove('open');
}

// ── MODALS ─────────────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m =>
  m.addEventListener('click', e => { if (e.target===m) m.classList.remove('open'); })
);

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  let csv = 'Jira,Epic,Section,#,Area/Item,Owner,Status,ETA,Blockers\n';
  epics.forEach(([j,n],ei) => {
    (sections[ei]||[]).forEach(sec => {
      (sec.rows||[]).forEach((r,ri) => {
        const e = v => `"${(v||'').replace(/"/g,'""')}"`;
        csv += [j,n,sec.name,ri+1,r.area,r.owner,r.status,r.eta,r.blockers].map(e).join(',')+'\n';
      });
    });
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'BTS_Tracker.csv'; a.click();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async () => {
  // Start with hardcoded default data
  initSections();
  render();
  updateEpicDropdown();
  updateDashboard();
  updateRowCount();
  // Load from Firebase and merge
  setStatus('⏳ Connecting...', '#888');
  const loaded = await loadFromFirebase();
  if (loaded) {
    render();
    updateEpicDropdown();
    updateDashboard();
    updateRowCount();
  }
  // Show overdue toast
  setTimeout(showOverdueToast, 800);
})();
</script>
